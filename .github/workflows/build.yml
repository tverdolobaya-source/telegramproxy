name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Show files in repository
        run: |
          echo "=== Содержимое репозитория ==="
          ls -la
          echo "=== Проверка main.py ==="
          if [ -f "main.py" ]; then
            echo "✅ main.py найден"
            head -n 5 main.py
          else
            echo "❌ main.py НЕ НАЙДЕН!"
            exit 1
          fi
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev wget
          
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install --user buildozer cython
          
      - name: Check buildozer.spec
        run: |
          echo "=== Содержимое buildozer.spec ==="
          cat buildozer.spec
          
      - name: Build with Buildozer (with full output)
        run: |
          export PATH=$PATH:~/.local/bin
          echo "=== НАЧАЛО СБОРКИ ==="
          buildozer android debug 2>&1 | tee build.log
          echo "=== КОНЕЦ СБОРКИ ==="
          
      - name: Show last 50 lines of log if failed
        if: failure()
        run: |
          echo "=== ПОСЛЕДНИЕ 50 СТРОК ЛОГА ==="
          tail -n 50 build.log
          echo "=== ПОЛНЫЙ ЛОГ ==="
          cat build.log
          
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          
      - name: Upload APK (if built)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: bin/*.apk
